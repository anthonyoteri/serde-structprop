name: Release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # -------------------------------------------------------------------------
  # Gate: all CI checks must pass before we publish anything.
  # -------------------------------------------------------------------------
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  # -------------------------------------------------------------------------
  # Publish to crates.io and create a GitHub release.
  # -------------------------------------------------------------------------
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cocogitto
        uses: cocogitto/cocogitto-action@v3
        with:
          check: false

      - name: Generate release notes for this tag
        id: changelog
        run: |
          # Extract the version from the tag (strip leading 'v').
          VERSION="${GITHUB_REF_NAME#v}"
          # Write release notes outside the repo so cargo publish --locked
          # does not see an untracked file and refuse to run.
          cog changelog --at "$GITHUB_REF_NAME" > /tmp/release_notes.md || \
            echo "No structured changelog available for $GITHUB_REF_NAME." > /tmp/release_notes.md
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish serde-structprop to crates.io
        run: cargo publish -p serde-structprop
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for serde-structprop to be indexed on crates.io
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://crates.io/api/v1/crates/serde-structprop/${VERSION}"
          echo "Polling ${URL} ..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "User-Agent: serde-structprop-release-ci" "${URL}")
            if [ "$STATUS" = "200" ]; then
              echo "serde-structprop ${VERSION} is available on crates.io"
              exit 0
            fi
            echo "Attempt ${i}/24: not yet indexed (HTTP ${STATUS}), retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for serde-structprop ${VERSION} to appear on crates.io"
          exit 1

      - name: Publish structprop-validator to crates.io
        run: cargo publish -p structprop-validator
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # Build structprop-validator binaries and attach them to the GitHub release.
  # Runs in parallel across platforms after the release is created.
  # -------------------------------------------------------------------------
  build-binaries:
    name: Build binary (${{ matrix.asset_name }})
    needs: publish
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: structprop-validator
            asset_name: structprop-validator-linux-x86_64
            target: x86_64-unknown-linux-musl
            artifact_dir: target/x86_64-unknown-linux-musl/release
          - os: macos-13
            artifact: structprop-validator
            asset_name: structprop-validator-macos-x86_64
            target: ""
            artifact_dir: target/release
          - os: macos-latest
            artifact: structprop-validator
            asset_name: structprop-validator-macos-aarch64
            target: ""
            artifact_dir: target/release
          - os: windows-latest
            artifact: structprop-validator.exe
            asset_name: structprop-validator-windows-x86_64.exe
            target: ""
            artifact_dir: target/release

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: >
          cargo build --release -p structprop-validator
          ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

      - name: Strip binary (Unix only)
        if: runner.os != 'Windows'
        run: strip ${{ matrix.artifact_dir }}/${{ matrix.artifact }}

      - name: Upload binary to GitHub release
        run: >
          gh release upload "${{ github.ref_name }}"
          "${{ matrix.artifact_dir }}/${{ matrix.artifact }}#${{ matrix.asset_name }}"
          --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
