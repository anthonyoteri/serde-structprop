name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (auto, major, minor, patch)"
        required: false
        default: auto

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Bump version and generate changelog
        id: release
        uses: cocogitto/cocogitto-action@v4.2.0
        with:
          command: bump
          args: --${{ inputs.bump }}
          git-user: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"

      - name: Generate release notes
        if: steps.release.outputs.version != ''
        run: |
          cog changelog --at "${{ steps.release.outputs.version }}" \
            > /tmp/release_notes.md \
            || echo "No structured changelog available." > /tmp/release_notes.md

      - name: Publish serde-structprop to crates.io
        if: steps.release.outputs.version != ''
        run: cargo publish -p serde-structprop
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for serde-structprop to be indexed
        if: steps.release.outputs.version != ''
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          VERSION="${VERSION#v}"
          URL="https://crates.io/api/v1/crates/serde-structprop/${VERSION}"
          echo "Polling ${URL} ..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "User-Agent: serde-structprop-release-ci" "${URL}")
            if [ "$STATUS" = "200" ]; then
              echo "serde-structprop ${VERSION} is available on crates.io"
              exit 0
            fi
            echo "Attempt ${i}/24: not yet indexed (HTTP ${STATUS}), retrying in 10s..."
            sleep 10
          done
          echo "Timed out waiting for serde-structprop ${VERSION} to appear on crates.io"
          exit 1

      - name: Publish structprop-validator to crates.io
        if: steps.release.outputs.version != ''
        run: cargo publish -p structprop-validator
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub release
        if: steps.release.outputs.version != ''
        run: |
          gh release create "${{ steps.release.outputs.version }}" \
            --title "${{ steps.release.outputs.version }}" \
            --notes-file /tmp/release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
