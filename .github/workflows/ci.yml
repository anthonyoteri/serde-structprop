name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install stable toolchain with clippy and rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -W clippy::pedantic

  commits:
    name: Conventional commits
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history is required for cog check to validate all commits.
          fetch-depth: 0

      - name: Check conventional commits
        uses: cocogitto/cocogitto-action@v3
        with:
          check: true
          # On PRs check only the commits introduced by the PR.
          # On pushes to main check only commits since the previous HEAD.
          from: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}

  changelog:
    name: Update changelog
    runs-on: ubuntu-latest
    # Only run on pushes to main, not on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Needs write access to commit the updated CHANGELOG.md.
    permissions:
      contents: write
    # Serialize changelog runs so concurrent pushes don't cause non-fast-forward failures.
    concurrency:
      group: changelog
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: cocogitto/cocogitto-action@v3
        with:
          check: false
          git-user: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"
          release: false

      - name: Commit updated CHANGELOG.md
        run: |
          cog changelog > CHANGELOG.md
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          # [skip ci] is natively honored by GitHub Actions for push-triggered workflows.
          git diff --cached --quiet || git commit -m "chore: update CHANGELOG.md [skip ci]"
          git pull --rebase
          git push

  msrv:
    name: MSRV
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check MSRV builds
        run: cargo check
